common:
  - type: Website
    url: https://www.afginc.com
  - type: Website
    url: https://www.greatamericaninsurancegroup.com
    name: Great American Insurance Group
  - type: Features
    data:
      - name: Specialty Property and Casualty Insurance
        description: >-
          More than 40 specialty insurance divisions serving niche markets including
          aviation, cyber risk, environmental, equine, ocean marine, professional
          liability, and executive liability.
      - name: Fixed and Indexed Annuities
        description: >-
          Fixed, fixed indexed, and variable-indexed annuity products distributed
          through Great American Life for retirement income and savings.
      - name: Agricultural Insurance
        description: >-
          Specialized farm and ranch insurance covering crop, livestock, equipment,
          and agribusiness operations across the United States.
      - name: Cyber Risk Insurance
        description: >-
          Commercial cyber liability coverage protecting businesses from data breaches,
          ransomware attacks, business interruption, and regulatory fines.
      - name: Trade Credit and Political Risk
        description: >-
          FCIA-backed trade credit insurance and political risk coverage for businesses
          engaged in domestic and international trade finance.
      - name: Professional and Executive Liability
        description: >-
          Directors and officers, errors and omissions, employment practices liability,
          and fiduciary liability for corporations and executives.
  - type: UseCases
    data:
      - name: Specialty Commercial Risk Management
        description: >-
          Helping businesses in niche industries manage unique operational risks through
          specialized insurance products tailored to their specific exposures.
      - name: Retirement Savings and Income
        description: >-
          Providing retirement planning solutions through fixed indexed annuities that
          offer growth potential with principal protection for pre-retirees.
      - name: International Trade Finance Protection
        description: >-
          Protecting exporters and lenders against payment default risk and political
          disruptions in cross-border trade transactions.
      - name: Corporate Liability Protection
        description: >-
          Protecting company executives and boards from personal liability arising from
          management decisions, fiduciary duties, and regulatory actions.
  - type: Integrations
    data:
      - name: Independent Agent and Broker Networks
        description: >-
          Distribution through independent agents, brokers, and wholesale intermediaries
          specializing in specialty commercial insurance lines.
      - name: Managing General Agents
        description: >-
          Partnerships with managing general agents (MGAs) and program administrators
          to distribute specialty insurance products in targeted markets.
