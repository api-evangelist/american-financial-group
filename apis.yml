name: American Financial Group
description: >-
  American Financial Group (AFG) is a holding company engaged primarily in property
  and casualty insurance, focusing on specialized commercial products for businesses,
  and in the sale of fixed and indexed annuities through its Great American Insurance
  Group and Great American Life subsidiaries. AFG serves businesses across more than
  40 specialty markets including agriculture, aviation, cyber, environmental, equine,
  ocean marine, professional liability, and transportation.
